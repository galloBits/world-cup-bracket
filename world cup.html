<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>
body{font-family:Arial;background:#f5f5f5;padding:14px}h1{text-align:center}.grid{display:grid;gap:12px}@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}.round{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px}.round h2{background:#00b36b;color:#fff;padding:8px;border-radius:6px;text-align:center}.match{border:1px solid #ddd;margin:8px 0;padding:8px}.team{display:grid;grid-template-columns:30px 1fr 50px;gap:8px;padding:6px}.score{font-size:16px;padding:5px}.btn{width:100%;background:#00b36b;color:#fff;border:none;padding:8px;border-radius:6px}
</style></head><body><h1>World Cup Bracket</h1><div class='grid'><div class='round'><h2>Round of 16</h2><div id='r16'></div></div><div class='round'><h2>Quarterfinals</h2><div id='qf'></div></div><div class='round'><h2>Semifinals</h2><div id='sf'></div></div><div class='round'><h2>Final</h2><div id='fn'></div><h3 id='champ'>Champion: TBD</h3></div></div>
<script>
const F={"Paraguay":"🇵🇾","France":"🇫🇷","Canada":"🇨🇦","Morocco":"🇲🇦","Portugal":"🇵🇹","Spain":"🇪🇸","United States":"🇺🇸","Belgium":"🇧🇪","Brazil":"🇧🇷","Norway":"🇳🇴","Mexico":"🇲🇽","England":"🏴","Argentina":"🇦🇷","Egypt":"🇪🇬","Switzerland":"🇨🇭","Colombia":"🇨🇴","TBD":"⬜"};
let S={r16:[["Paraguay","France"],["Canada","Morocco"],["Portugal","Spain"],["United States","Belgium"],["Brazil","Norway"],["Mexico","England"],["Argentina","Egypt"],["Switzerland","Colombia"]],qf:[["TBD","TBD"],["TBD","TBD"],["TBD","TBD"],["TBD","TBD"]],sf:[["TBD","TBD"],["TBD","TBD"]],fn:[["TBD","TBD"]],champ:"TBD"};
function round(id,data,next){let c=document.getElementById(id);c.innerHTML="";data.forEach((m,i)=>{let d=document.createElement("div");d.className="match";d.innerHTML=`<div class='team'><div>${F[m[0]]||""}</div><div>${m[0]}</div><input class='score' type='number'></div><div class='team'><div>${F[m[1]]||""}</div><div>${m[1]}</div><input class='score' type='number'></div><button class='btn'>Advance Winner</button>`;let ins=d.querySelectorAll("input");d.querySelector("button").onclick=()=>{if(ins[0].value==""||ins[1].value==""){alert("Enter both scores");return;}if(+ins[0].value==+ins[1].value){alert("No ties");return;}next(i,+ins[0].value>+ins[1].value?m[0]:m[1]);render();};c.appendChild(d);});}
function render(){round("r16",S.r16,(i,w)=>S.qf[Math.floor(i/2)][i%2]=w);round("qf",S.qf,(i,w)=>S.sf[Math.floor(i/2)][i%2]=w);round("sf",S.sf,(i,w)=>S.fn[0][i]=w);round("fn",S.fn,(i,w)=>{S.champ=w;document.getElementById("champ").textContent="Champion: "+w;});}
render();
</script></body></html>
